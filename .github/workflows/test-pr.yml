name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-suite: [renderer, electron, lint, typecheck]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.0.9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.15.0'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run renderer tests
      if: matrix.test-suite == 'renderer'
      run: pnpm run test:renderer

    - name: Run electron tests
      if: matrix.test-suite == 'electron'
      run: pnpm run test:electron

    - name: Run lint
      if: matrix.test-suite == 'lint'
      run: pnpm run lint

    - name: Run typecheck
      if: matrix.test-suite == 'typecheck'
      run: pnpm run typecheck
